<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css3">
</head>

<body>

    <h1>🐾 Pet Adoption Matcher</h1>

    <!-- Create Animal -->
    <section>
        <h2>Create Adoption Animal Profile</h2>
        <form id="adoption-animal-form" onsubmit="submitAdoptionAnimalProfile(event)">
            <label>Name:</label>
            <input type="text" id="animal-name" required>

            <label>Type of Animal:</label>
            <select id="animal-type" required>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Other">Other</option>
            </select>

            <label>Select Characteristics (up to 5):</label>
            <select id="animal-characteristics" multiple required>
                <option>Friendly</option>
                <option>Energetic</option>
                <option>Calm</option>
                <option>Playful</option>
                <option>Trained</option>
                <option>Good with Kids</option>
                <option>Good with Other Pets</option>
            </select>

            <button type="submit">Create Adoption Profile</button>
        </form>
    </section>

    <!-- Create Owner -->
    <section>
        <h2>Create Owner Profile</h2>
        <form id="owner-profile-form" onsubmit="submitOwnerProfile(event)">
            <label>Owner Name:</label>
            <input type="text" id="owner-name" required>

            <label>Desired Characteristics (up to 5):</label>
            <select id="dream-characteristics" multiple required>
                <option>Friendly</option>
                <option>Energetic</option>
                <option>Calm</option>
                <option>Playful</option>
                <option>Trained</option>
                <option>Good with Kids</option>
                <option>Good with Other Pets</option>
            </select>

            <button type="submit">Create Owner Profile</button>
        </form>
    </section>

    <!-- Match -->
    <section>
        <h2>Find Matches</h2>
        <button onclick="matchProfiles()">Match Profiles</button>
    </section>

    <!-- Results -->
    <section id="match-results-page">
        <h2>Match Results</h2>
        <div id="match-results" class="flow-chart"></div>
    </section>

    <script src="script.js"></script>

</body>
</html>
