<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css3">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h1>🐾 PetConnect</h1>
    <div>
        <button onclick="showSection('adoption')">Adoption</button>
        <button onclick="showSection('lost')">Lost & Found</button>
    </div>
</nav>

<!-- ADOPTION SECTION -->
<div id="adoption-section">

<section>
<h2>Create Adoption Animal Profile</h2>
<form onsubmit="submitAdoptionAnimalProfile(event)">
<input type="text" id="animal-name" placeholder="Name" required>

<select id="animal-type">
<option>Dog</option>
<option>Cat</option>
<option>Other</option>
</select>

<div id="animal-characteristics">
<label><input type="checkbox" value="Friendly"> Friendly</label>
<label><input type="checkbox" value="Energetic"> Energetic</label>
<label><input type="checkbox" value="Calm"> Calm</label>
<label><input type="checkbox" value="Playful"> Playful</label>
<label><input type="checkbox" value="Trained"> Trained</label>
</div>

<button>Create Profile</button>
</form>
</section>

<section>
<h2>Create Owner Profile</h2>
<form onsubmit="submitOwnerProfile(event)">
<input type="text" id="owner-name" placeholder="Owner Name" required>

<select id="dream-characteristics" multiple>
<option>Friendly</option>
<option>Energetic</option>
<option>Calm</option>
<option>Playful</option>
<option>Trained</option>
</select>

<button>Create Owner</button>
</form>
</section>

<section>
<button onclick="matchProfiles()">Match Pets</button>
<div id="adoption-results" class="flow-chart"></div>
</section>

</div>

<!-- LOST DOG SECTION -->
<div id="lost-section" class="hidden">

<section>
<h2>Missing Dog</h2>
<form onsubmit="submitMissingDogProfile(event)">
<input type="text" id="missing-dog-name" placeholder="Dog Name" required>

<select id="missing-dog-color">
<option>Black</option>
<option>Brown</option>
<option>White</option>
</select>

<select id="missing-dog-size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<input type="text" id="missing-dog-breed" placeholder="Breed">
<button>Create Missing Profile</button>
</form>
</section>

<section>
<h2>Found Dog</h2>
<form onsubmit="submitFoundDogProfile(event)">
<select id="found-dog-color">
<option>Black</option>
<option>Brown</option>
<option>White</option>
</select>

<select id="found-dog-size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<input type="text" id="found-dog-breed" placeholder="Breed">
<button>Create Found Profile</button>
</form>
</section>

<section>
<button onclick="matchDogProfiles()">Find Matches</button>
<div id="lost-results"></div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
